<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>影子跑酷 · 满天飞鸟修复版</title>
<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Microsoft YaHei";
    }

    #game {
        width: 800px;
        height: 400px;
        background: linear-gradient(#87ceeb, #d0f0ff);
        position: relative;
        overflow: hidden;
        border: 3px solid #000;
    }

    /* ================= 菜单 ================= */
    #menu {
        position: absolute;
        inset: 0;
        background: linear-gradient(#87ceeb, #d0f0ff);
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    #menu button {
        margin: 10px;
        padding: 12px 30px;
        font-size: 18px;
        cursor: pointer;
        background: #fff;
        border: 2px solid #000;
        color: #333;
    }

    #exitBtn {
        position: absolute;
        left: 10px;
        top: 10px;
    }

    #helpText {
        margin-top: 15px;
        font-size: 14px;
        color: #333;
        text-align: center;
        white-space: pre-line;
        display: none;
    }

    /* ================= 游戏元素 ================= */
    .player {
        width: 45px;
        height: 60px;
        background-image: url("https://static.tcamp.qq.com/gallery/prod/2026/4/30/f298053cd11b3088/c65ae8be-0622-4340-873f-8e24bf2ef288.png");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        position: absolute;
        z-index: 10;
    }

    .shadow {
        width: 36px;
        height: 36px;
        background: rgba(0,0,0,0.5);
        position: absolute;
        z-index: 5;
    }

    .groundBlock {
        width: 200px;
        height: 60px;
        background: #654321;
        position: absolute;
        bottom: 0;
    }

    .obstacle {
        width: 40px;
        height: 40px;
        background: red;
        position: absolute;
    }

    .enemy {
        width: 30px;
        height: 30px;
        background: purple;
        position: absolute;
    }

    .bullet {
        width: 15px;
        height: 15px;
        background: red;
        border-radius: 50%;
        position: absolute;
    }

    /* ✅ 使用你提供的飞鸟图片 */
    .bird {
        width: 48px;
        height: 38px;
        background-image: url("https://ts1.tc.mm.bing.net/th/id/OIP-C.k-u4bLVqjvXlaykvq-khFQHaF2?w=193&h=152&c=8&rs=1&qlt=90&o=6&dpr=1.3&pid=3.1&rm=2");
        background-size: cover;
        background-repeat: no-repeat;
        position: absolute;
        z-index: 2;
        opacity: 0.9;
    }

    #ui {
        position: absolute;
        top: 10px;
        right: 10px;
        color: #000;
        font-size: 16px;
        z-index: 20;
    }

    #shadowCooldown {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #000;
        font-size: 16px;
        z-index: 20;
    }

    #hint {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #000;
        font-size: 22px;
        z-index: 20;
        text-align: center;
        display: none;
    }

    #skipBtn {
        position: absolute;
        left: 80px;
        top: 260px;
        padding: 8px 14px;
        background: #fff;
        border: 2px solid #000;
        cursor: pointer;
        z-index: 30;
        display: none;
    }
</style>
</head>

<body>

<div id="game">
    <!-- 菜单 -->
    <div id="menu">
        <button id="startBtn">开始游戏</button>
        <button id="helpBtn">游戏玩法</button>
        <div id="helpText">
A键左移，D键右移，
Space键跳跃，
K键释放影子
（碰到影子可以减速，释放有冷却）
        </div>
        <button id="exitBtn">退出游戏</button>
    </div>

    <div id="ui">
        剩余距离：<span id="distance">0</span> 米
    </div>
    <div id="shadowCooldown">影子冷却：0.0s</div>
    <div id="skipBtn">一键通关</div>
    <div class="player" id="player"></div>
    <div id="hint"></div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const hint = document.getElementById("hint");
const distanceUI = document.getElementById("distance");
const shadowCD = document.getElementById("shadowCooldown");
const skipBtn = document.getElementById("skipBtn");

const menu = document.getElementById("menu");
const startBtn = document.getElementById("startBtn");
const helpBtn = document.getElementById("helpBtn");
const helpText = document.getElementById("helpText");
const exitBtn = document.getElementById("exitBtn");

const SCREEN_WIDTH = 800;
const GOAL_METERS = 2000;
const METER_TO_PX = 5;
const GOAL = GOAL_METERS * METER_TO_PX;

let gameState = "menu";
let animationId = null;

let worldX, worldY, vy, onGround;
let cameraX = 0;
let shadows = [];
let cooldown = 0;

let groundBlocks = [];
let obstacles = [];
let enemies = [];
let bullets = [];
let birds = [];
let spawnX = 800;

let lastGapX = 0;
const MIN_GAP_DISTANCE = 300;

let inShadow = false;
let canShadowJump = false;
let deathCount = 0;

const keys = {};

/* ================= 初始状态 ================= */
function init() {
    worldX = 100;
    worldY = 295;
    vy = 0;
    onGround = true;

    cameraX = 0;
    shadows = [];
    cooldown = 0;

    groundBlocks = [{ x: 0, w: 400, yOffset: 0 }];
    obstacles = [];
    enemies = [];
    bullets = [];
    birds = [];

    spawnX = 800;
    lastGapX = 0;
    inShadow = false;
    canShadowJump = false;

    distanceUI.textContent = GOAL_METERS;
    player.style.left = "60px";
    player.style.top = worldY + "px";

    skipBtn.style.display = "none";

    for (let i = 0; i < 30; i++) {
        generateTerrain(spawnX);
        spawnX += 200 + Math.random() * 150;
    }

    generateStaticObstacles();
}

/* ================= 菜单控制 ================= */
startBtn.onclick = () => {
    menu.style.display = "none";
    gameState = "playing";
    init();
    animationId = requestAnimationFrame(loop);
    startBirdSpawner();
};

helpBtn.onclick = () => {
    helpText.style.display =
        helpText.style.display === "block" ? "none" : "block";
};

exitBtn.onclick = () => {
    cancelAnimationFrame(animationId);
    gameState = "menu";
    menu.style.display = "flex";
    hint.style.display = "none";
};

/* ================= 飞鸟系统 ✅ 修复版 ================= */
function startBirdSpawner() {
    setInterval(() => {
        if (gameState === "playing") {
            birds.push({
                // ✅ 关键修复：基于 cameraX 生成
                x: cameraX + SCREEN_WIDTH + 50,
                y: 20 + Math.random() * 260,
                speed: 2 + Math.random() * 1.5
            });
        }
    }, 900);
}

function updateBirds() {
    birds.forEach((b, i) => {
        b.x -= b.speed;
        // ✅ 关键修复：基于 cameraX 销毁
        if (b.x < cameraX - 60) {
            birds.splice(i, 1);
        }
    });
}

function drawBirds() {
    document.querySelectorAll(".bird").forEach(e => e.remove());
    birds.forEach(b => {
        const d = document.createElement("div");
        d.className = "bird";
        d.style.left = (b.x - cameraX) + "px";
        d.style.top = b.y + "px";
        game.appendChild(d);
    });
}

/* ================= 地形与障碍 ================= */
function generateTerrain(x) {
    if (x - lastGapX < MIN_GAP_DISTANCE) return;
    if (Math.random() < 0.35) { lastGapX = x; return; }

    groundBlocks.push({
        x: x,
        w: 120 + Math.random() * 150,
        yOffset: Math.random() < 0.3 ? -40 : 0
    });
}

function generateStaticObstacles() {
    groundBlocks.forEach(g => {
        if (Math.random() < 0.3) {
            obstacles.push({
                x: g.x + Math.random() * (g.w - 40),
                y: 270 + (g.yOffset || 0) - Math.random() * 60,
                w: 40,
                h: 40
            });
        }
    });
}

/* ================= 输入 ================= */
document.addEventListener("keydown", e => {
    keys[e.code] = true;

    if (e.code === "Space") {
        if (gameState === "playing" && (onGround || canShadowJump)) {
            vy = -13;
            canShadowJump = false;
        }
    }

    if (gameState === "dead" && e.code === "KeyR") {
        menu.style.display = "flex";
        gameState = "menu";
        hint.style.display = "none";
    }
});

document.addEventListener("keyup", e => keys[e.code] = false);

/* ================= 主循环 ================= */
function loop() {
    if (gameState !== "playing") return;
    update();
    draw();
    animationId = requestAnimationFrame(loop);
}

/* ================= 更新 ================= */
function update() {
    if (keys["ArrowLeft"] || keys["KeyA"]) worldX -= 5;
    if (keys["ArrowRight"] || keys["KeyD"]) worldX += 5;

    vy += inShadow ? 0.08 : 0.6;
    worldY += vy;

    onGround = false;
    inShadow = false;

    if (vy >= 0) {
        groundBlocks.forEach(g => {
            if (
                worldX + 30 > g.x &&
                worldX < g.x + g.w &&
                worldY + 60 >= 310 + (g.yOffset || 0)
            ) {
                worldY = 310 + (g.yOffset || 0);
                vy = 0;
                onGround = true;
            }
        });
    }

    shadows.forEach(s => {
        if (
            worldX + 36 > s.x &&
            worldX < s.x + 36 &&
            worldY + 60 > s.y &&
            worldY < s.y + 36
        ) {
            inShadow = true;
            canShadowJump = true;
        }
    });

    if (keys["KeyK"] && cooldown <= 0) {
        shadows.push({ x: worldX, y: worldY });
        cooldown = 80;
        if (shadows.length > 3) shadows.shift();
    }
    if (cooldown > 0) cooldown--;

    cameraX = worldX - SCREEN_WIDTH / 2;
    if (cameraX < 0) cameraX = 0;

    while (groundBlocks.length && groundBlocks[0].x < worldX - 800) {
        groundBlocks.shift();
    }

    obstacles = obstacles.filter(o => o.x > worldX - 400);
    enemies = enemies.filter(e => e.x > worldX - 400);

    enemies.forEach(e => {
        e.timer = (e.timer || 0) + 1;
        if (e.timer > 120) {
            bullets.push({ x: e.x, y: e.y + 10, vx: -6 });
            e.timer = 0;
        }
    });

    bullets.forEach((b, i) => {
        b.x += b.vx;

        shadows.forEach(s => {
            if (
                b.x < s.x + 36 &&
                b.x + 15 > s.x &&
                b.y < s.y + 36 &&
                b.y + 15 > s.y
            ) {
                bullets.splice(i, 1);
            }
        });

        if (
            b.x < worldX + 30 &&
            b.x + 15 > worldX &&
            b.y < worldY + 60 &&
            b.y + 15 > worldY
        ) {
            gameOver("💀 被子弹击中");
        }
    });

    obstacles.forEach(o => {
        if (
            worldX < o.x + o.w &&
            worldX + 30 > o.x &&
            worldY + 60 > o.y &&
            worldY < o.y + o.h
        ) {
            gameOver("💀 撞到障碍物");
        }
    });

    if (worldY > 350) gameOver("💀 掉下悬崖了");

    const remain = Math.max(0, GOAL_METERS - Math.floor(worldX / METER_TO_PX));
    distanceUI.textContent = remain;

    shadowCD.textContent = "影子冷却：" +
        (cooldown > 0 ? (cooldown / 60).toFixed(1) : "0.0") + "s";

    if (worldX >= GOAL) gameOver("🎉 到达终点！");

    updateBirds();
}

/* ================= 绘制 ================= */
function draw() {
    player.style.left = (worldX - cameraX) + "px";
    player.style.top = worldY + "px";

    document.querySelectorAll(".groundBlock, .shadow, .obstacle, .enemy, .bullet")
        .forEach(e => e.remove());

    groundBlocks.forEach(g => {
        const d = document.createElement("div");
        d.className = "groundBlock";
        d.style.left = (g.x - cameraX) + "px";
        d.style.width = g.w + "px";
        d.style.bottom = (-g.yOffset || 0) + "px";
        game.appendChild(d);
    });

    obstacles.forEach(o => {
        const d = document.createElement("div");
        d.className = "obstacle";
        d.style.left = (o.x - cameraX) + "px";
        d.style.top = o.y + "px";
        game.appendChild(d);
    });

    shadows.forEach(s => {
        const d = document.createElement("div");
        d.className = "shadow";
        d.style.left = (s.x - cameraX) + "px";
        d.style.top = s.y + "px";
        game.appendChild(d);
    });

    enemies.forEach(e => {
        const d = document.createElement("div");
        d.className = "enemy";
        d.style.left = (e.x - cameraX) + "px";
        d.style.top = e.y + "px";
        game.appendChild(d);
    });

    bullets.forEach(b => {
        const d = document.createElement("div");
        d.className = "bullet";
        d.style.left = (b.x - cameraX) + "px";
        d.style.top = b.y + "px";
        game.appendChild(d);
    });

    drawBirds();
}

/* ================= 死亡 / 胜利 ================= */
function gameOver(msg) {
    gameState = "dead";
    cancelAnimationFrame(animationId);

    deathCount++;
    if (deathCount >= 3) skipBtn.style.display = "block";

    hint.innerHTML = msg + "<br>按 R 返回菜单";
    hint.style.display = "block";
}

skipBtn.onclick = () => {
    gameState = "dead";
    cancelAnimationFrame(animationId);
    hint.innerHTML = "🎉 已通关（一键通关）";
    hint.style.display = "block";
    skipBtn.style.display = "none";
};
</script>

</body>
</html>
